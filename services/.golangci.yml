version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - revive
    - gocritic
    - unused
    - ineffassign
    - gosec
    - nilerr
    - nolintlint
    - testifylint
  exclusions:
    rules:
      # ponytail: assistant spawns pw-cat/ffmpeg; config reads trusted CONFIG_PATH
      - path: internal/assistant/
        linters: [gosec]
      - path: internal/config/
        linters: [gosec]
      - path: internal/
        linters: [revive]
      - path: cmd/
        linters: [revive]

linters-settings:
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: error-return
      - name: exported
        disabled: true
      - name: package-comments
        disabled: true
      - name: redefines-builtin-id
        disabled: true
