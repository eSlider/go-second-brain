run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - revive
    - gocritic
    - unused
    - ineffassign
    - gosec
    - nilerr
    - nolintlint
    - testifylint

linters-settings:
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: error-return

issues:
  exclude-use-default: false
  exclude-rules:
    # ponytail: assistant spawns pw-cat/ffmpeg by design; file modes are local dev artifacts
    - path: internal/assistant/
      linters: [gosec]
