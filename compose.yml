# Рендер только в памяти: `mkdocs serve` (см. Dockerfile) не пишет статический сайт на диск.
# Изменения *.md подхватываются через bind-mount `.:/docs` и встроенный livereload MkDocs.
# `docker compose watch` — пересборка образа только при смене Dockerfile / requirements / mkdocs.yml.

services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - edelweiss-docs:latest
    image: edelweiss-docs:latest
    container_name: edelweiss-docs

    ports:
      # Слушать на всех интерфейсах хоста (не только localhost)
      - "0.0.0.0:${DOCS_PORT:-5496}:8000"

    # Весь репозиторий (mkdocs.yml в корне, контент в docs/ включая docs/project/)
    volumes:
      - .:/docs
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro

    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

    develop:
      watch:
        - action: rebuild
          path: mkdocs.yml
        - action: rebuild
          path: requirements.txt
        - action: rebuild
          path: Dockerfile

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/search/search_index.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  neo4j:
    image: neo4j:5-community
    profiles: [kg, bot]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-edelweiss}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  qdrant:
    image: qdrant/qdrant:latest
    profiles: [kg, bot]
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  kg-ingestor:
    build:
      context: ./services
      dockerfile: Dockerfile
      target: ingestor
    image: edelweiss-kg-ingestor:latest
    profiles: [kg]
    depends_on:
      - neo4j
      - qdrant
    env_file:
      - .env
    environment:
      DOCS_ROOT: /repo/docs/project
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/repo:ro
    restart: "no"

  matrix-bot:
    build:
      context: ./services
      dockerfile: Dockerfile
      target: bot
    image: edelweiss-matrix-bot:latest
    profiles: [bot]
    depends_on:
      - neo4j
      - qdrant
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://host.docker.internal:11434
      MATRIX_BOT_DB: /data/matrix-bot.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - matrix-bot-data:/data
    restart: unless-stopped

volumes:
  neo4j-data:
  qdrant-data:
  matrix-bot-data:
