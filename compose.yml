# Render in memory: `mkdocs serve` (see Dockerfile). Markdown changes are picked up via bind-mount.
# Parameters from `.env` at repo root. Defaults in config.yaml.example.
# Copy config.yaml.example → config.yaml and .env.example → .env before first run.

name: second-brain

services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - second-brain-docs:latest
    image: second-brain-docs:latest
    container_name: second-brain-docs

    ports:
      - "0.0.0.0:${DOCS_PORT:-5496}:8000"

    volumes:
      - .:/docs
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro

    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

    develop:
      watch:
        - action: rebuild
          path: mkdocs.yml
        - action: rebuild
          path: requirements.txt
        - action: rebuild
          path: Dockerfile

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/search/search_index.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  neo4j:
    image: neo4j:5-community
    profiles: [kg, bot]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-change-me}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j-data:/data

  qdrant:
    image: qdrant/qdrant:latest
    profiles: [kg, bot]
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  kg-ingestor:
    build:
      context: ./services
      dockerfile: Dockerfile
      target: ingestor
    image: second-brain-kg-ingestor:latest
    profiles: [kg]
    depends_on:
      - neo4j
      - qdrant
    env_file:
      - .env
    environment:
      CONFIG_PATH: /repo/config.yaml
      DOCS_ROOT: ${COMPOSE_INGEST_DOCS_ROOT:-/repo/examples/corpus}
      NEO4J_URI: ${COMPOSE_INGEST_NEO4J_URI:-bolt://neo4j:7687}
      QDRANT_URL: ${COMPOSE_INGEST_QDRANT_URL:-http://qdrant:6333}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/repo:ro
    restart: "no"

  matrix-bot:
    build:
      context: ./services
      dockerfile: Dockerfile
      target: bot
    image: second-brain-matrix-bot:latest
    profiles: [bot]
    network_mode: ${COMPOSE_BOT_NETWORK_MODE:-host}
    depends_on:
      - neo4j
      - qdrant
    env_file:
      - .env
    environment:
      CONFIG_PATH: /repo/config.yaml
      NEO4J_URI: ${COMPOSE_BOT_NEO4J_URI:-bolt://127.0.0.1:7687}
      QDRANT_URL: ${COMPOSE_BOT_QDRANT_URL:-http://127.0.0.1:6333}
      OLLAMA_URL: ${OLLAMA_URL:-http://127.0.0.1:11434}
      MATRIX_BOT_DB: ${MATRIX_BOT_DB:-/data/matrix-bot.db}
    volumes:
      - .:/repo:ro
      - matrix-bot-data:/data
    restart: unless-stopped

volumes:
  neo4j-data:
  qdrant-data:
  matrix-bot-data:
